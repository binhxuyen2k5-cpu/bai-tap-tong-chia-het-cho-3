<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tính tổng số chia hết cho 3</title>
</head>
<body>

    <form onsubmit="handleSubmit(event)">
        <label>Số đầu:</label>
        <input type="number" id="startNumber" required>
        
        <label>Số cuối:</label>
        <input type="number" id="endNumber" required>
        
        <button type="submit">Tính tổng</button>
    </form>

    <h3 id="result"></h3>

    <script src="script.js"></script>
</body>
</html>
